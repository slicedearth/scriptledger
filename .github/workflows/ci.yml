name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Synthetic verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Use Node.js 24
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev

      - name: Install fixture browser
        run: npx playwright install --with-deps chromium

      - name: Run unit, security, and local integration tests
        run: npm test

      - name: Type-check library and tests
        run: npm run typecheck

      - name: Check Svelte application
        run: npm run check

      - name: Build library and synthetic static site
        run: npm run build

      - name: Test synthetic report in Chromium
        run: npm run test:browser

      - name: Check whitespace
        run: git diff --check
